name: docker-images

on:
  pull_request:
    paths:
      - "versions/*.json"
  push:
    branches:
      - main
    paths:
      - "versions/*.json"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  matrix:
    runs-on: ubuntu-latest
    outputs:
      rows: ${{ steps.generate.outputs.rows }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.x"

      - name: Generate matrix
        id: generate
        run: |
          rows_json="$(python .github/scripts/version_matrix.py)"
          echo "rows=$rows_json" >> "$GITHUB_OUTPUT"

  build:
    needs: matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.matrix.outputs.rows) }}
    env:
      IMAGE_NAME: ${{ matrix.image_name }}
      VERSION: ${{ matrix.version }}
      SOURCE_REPO: ${{ matrix.source_repo }}
      SOURCE_TAG: ${{ matrix.source_tag }}
      DOCKERFILE: ${{ matrix.dockerfile }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Clone upstream source
        run: git clone --depth 1 --branch "$SOURCE_TAG" "$SOURCE_REPO" upstream

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ env.VERSION }}

      - name: Build and push image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: upstream
          file: upstream/${{ env.DOCKERFILE }}
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          push: false
