  merge:
    name: Merge manifest (${{ matrix.config_name }} / ${{ matrix.image_name }} / ${{ matrix.version }})
    # if: github.event_name == 'push'
    needs:
      - matrix
      # - build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.matrix.outputs.rows) }}
    env:
      REGISTRY_IMAGE: ghcr.io/${{ github.repository_owner }}/${{ matrix.image_name }}
      VERSION: ${{ matrix.version }}
    steps:
      - name: Parse version parts
        id: version_parts
        run: |
          major="$(echo "$VERSION" | cut -d. -f1)"
          minor="$(echo "$VERSION" | cut -d. -f2)"
          echo "major=$major" >> "$GITHUB_OUTPUT"
          echo "minor=$minor" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Registry login
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifest
        run: |
          tags=(
            -t "${REGISTRY_IMAGE}:${VERSION}"
            -t "${REGISTRY_IMAGE}:${{ steps.version_parts.outputs.major }}.${{ steps.version_parts.outputs.minor }}"
            -t "${REGISTRY_IMAGE}:${{ steps.version_parts.outputs.major }}"
          )

          if [ "${GITHUB_REF_NAME}" = "${{ github.event.repository.default_branch }}" ]; then
            tags+=(-t "${REGISTRY_IMAGE}:latest")
          fi

          docker buildx imagetools create \
            "${tags[@]}" \
            "${REGISTRY_IMAGE}:${VERSION}-amd64" \
            "${REGISTRY_IMAGE}:${VERSION}-arm64"

      - name: Inspect manifest
        run: |
          docker buildx imagetools inspect "${REGISTRY_IMAGE}:${VERSION}"
