name: docker-images

on:
  pull_request:
    paths:
      - "images/*.json"
  push:
    branches:
      - main
    paths:
      - "images/*.json"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  matrix:
    name: Prepare build matrix
    runs-on: ubuntu-latest
    outputs:
      rows: ${{ steps.generate.outputs.rows }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.x"

      - name: Generate matrix
        id: generate
        run: |
          rows_json="$(python .github/scripts/version_matrix.py)"
          echo "rows=$rows_json" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.config_name }} / ${{ matrix.image_name }} / ${{ matrix.version }}
    needs: matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.matrix.outputs.rows) }}
    env:
      IMAGE_NAME: ${{ matrix.image_name }}
      VERSION: ${{ matrix.version }}
      SOURCE_REPO: ${{ matrix.source_repo }}
      SOURCE_TAG: ${{ matrix.source_tag }}
      DOCKERFILE: ${{ matrix.dockerfile }}
    steps:
      - name: Parse version parts
        id: version_parts
        run: |
          major="$(echo "$VERSION" | cut -d. -f1)"
          minor="$(echo "$VERSION" | cut -d. -f2)"
          echo "major=$major" >> "$GITHUB_OUTPUT"
          echo "minor=$minor" >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Clone upstream source
        run: git clone --depth 1 --branch "$SOURCE_TAG" "$SOURCE_REPO" upstream

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ env.VERSION }}
            type=raw,value=${{ steps.version_parts.outputs.major }}.${{ steps.version_parts.outputs.minor }}
            type=raw,value=${{ steps.version_parts.outputs.major }}

      - name: Registry login
        if: github.event_name == 'push'
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          context: upstream
          file: upstream/${{ env.DOCKERFILE }}
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          push: ${{ github.event_name == 'push' }}
