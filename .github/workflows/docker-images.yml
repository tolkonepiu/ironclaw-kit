name: docker-images

on:
  pull_request:
    paths:
      - "images/*.json"
  push:
    branches:
      - main
    paths:
      - "images/*.json"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  matrix:
    name: Prepare build matrix
    runs-on: ubuntu-latest
    outputs:
      rows: ${{ steps.generate.outputs.rows }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.x"

      - name: Generate matrix
        id: generate
        run: |
          rows_json="$(python .github/scripts/version_matrix.py)"
          echo "rows=$rows_json" >> "$GITHUB_OUTPUT"

